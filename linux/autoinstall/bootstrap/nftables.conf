table inet filter {

  chain input {
    type filter hook input priority 0;

    # allow loopback
    iif "lo" accept

    # allow established/related traffic
    ct state established,related accept

    # allow SSH (VS Code Remote SSH depends on this)
    tcp dport 22 accept

    # allow ping (optional but useful)
    ip protocol icmp accept
    ip6 nexthdr icmpv6 accept

    # drop everything else inbound
    counter drop
  }

  chain output {
    type filter hook output priority 0;

    # allow loopback
    oif "lo" accept

    # allow established connections
    ct state established,related accept

    # allow DNS (critical)
    udp dport 53 accept
    tcp dport 53 accept

    # allow HTTPS (typical for cargo, git, etc.)
    tcp dport 443 accept
    tcp dport 80 accept

    # OPTIONAL: allow SSH outbound (git over ssh, etc.)
    tcp dport 22 accept

    # LOG blocked outbound traffic (very useful for allowlist building)
    counter log prefix "NFT DROP OUT: " flags all drop
  }
}